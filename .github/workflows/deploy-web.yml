name: Deploy Web to Vercel

# 推送到主分支即自动把 ocr_web 部署到 Vercel（生产环境）。
# 因为本仓库是 monorepo，Vercel 项目的 Root Directory 应设为 ocr_web。
#
# 需在仓库 Settings → Secrets and variables → Actions 配置以下 secrets：
#   VERCEL_TOKEN       Vercel 账号 Token（vercel.com/account/tokens）
#   VERCEL_ORG_ID      团队/个人 ID（项目根 .vercel/project.json 或 `vercel link` 生成）
#   VERCEL_PROJECT_ID  Vercel 项目 ID（同上）

on:
  push:
    branches: [main, master]
    paths:
      - 'ocr_web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

# 同一分支新推送时取消正在进行的旧部署，避免并发抢占。
concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ocr_web
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ocr_web/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

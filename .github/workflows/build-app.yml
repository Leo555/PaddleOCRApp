name: Build Desktop App

# 用 PyInstaller 把 ocr_app 打成各平台的可下载客户端包：
#   - 打 tag（v*）：自动构建，build 全部成功后由独立的 release job 统一发布到 GitHub Releases，
#     供下载页的 latest 固定链接直接下载（公网可用），并附带 SHA256SUMS.txt 校验文件。
#   - 手动触发（workflow_dispatch）：需要临时验证打包时在 Actions 页面点 Run workflow，
#     产物仅作为 workflow Artifacts 上传（不发布 Release）。
#
# 说明：app 构建跨 4 平台、耗时较长，故不在日常 push 自动跑；发版只走 tag，平时验证靠手动触发。
# 产出的资产名与 ocr_web 下载页(src/Download.tsx)中的常量保持一致，改名需同步两处。

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon (arm64)
            label: macOS Apple Silicon
            asset: PaddleOCRApp-macos-arm64.zip
          - os: macos-13        # Intel (x86_64)
            label: macOS Intel
            asset: PaddleOCRApp-macos-x64.zip
          - os: windows-latest
            label: Windows x64
            asset: PaddleOCRApp-windows-x64.zip
          - os: ubuntu-latest
            label: Linux x64
            asset: PaddleOCRApp-linux-x64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 缓存 pip 下载，避免每次重装 onnxruntime / PySide6 / PyInstaller 等大依赖。
          cache: pip
          cache-dependency-path: ocr_app/requirements.txt

      - name: Install dependencies
        working-directory: ocr_app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        working-directory: ocr_app
        run: pyinstaller ocr_app.spec --noconfirm

      # ---- 打包成单一可下载文件（各平台压缩方式不同） ----
      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: ocr_app/dist
        run: zip -ry "../../${{ matrix.asset }}" "PaddleOCRApp.app"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ocr_app/dist/PaddleOCRApp/* -DestinationPath ${{ matrix.asset }} -Force

      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: ocr_app/dist
        run: tar -czf "../../${{ matrix.asset }}" PaddleOCRApp

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 30

  # ---- 仅打 tag 时执行：等所有平台构建完成后统一发布，避免并发抢占同一 Release ----
  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # 发布 Release 需要写权限
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true # 把各 artifact 平铺到同一目录，便于统一处理

      - name: Generate SHA256 checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
